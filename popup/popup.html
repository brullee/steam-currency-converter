<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div id="page-main">
        <div class="header-row">
            <h1>Currency Converter</h1>
            <label class="toggle" title="Enable / disable conversion">
                <input type="checkbox" id="conversion-enabled">
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
            </label>
        </div>

        <div id="settings">
            <div id="to-currency-group">
                <label for="to-currency">Convert prices to</label>
                <div class="cc-combobox">
                    <input id="to-currency" placeholder="e.g. JOD, USD, EUR" autocomplete="off" spellcheck="false">
                    <ul id="to-currency-dropdown" hidden></ul>
                </div>
            </div>

            <label for="from-currency">Store currency</label>
            <select id="from-currency">
                <option value="" disabled selected>Select Your Currency</option>
            </select>

            <label class="checkbox-label">
                <input type="checkbox" id="hover-enabled">
                Show original price on hover
            </label>

            <label class="checkbox-label">
                <input type="checkbox" id="strip-trailing">
                Remove USD trail
                <span class="tooltip-icon">?</span>
            </label>
        </div>

        <button id="save">Save &amp; Refresh page</button>
        <button class="link-btn" id="more-btn">More settings</button>
    </div>

    <div id="page-more" hidden>
        <div class="header-row">
            <h1>More Settings</h1>
            <button class="back-btn" id="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M14 6 L20 12 L14 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="20" y1="12" x2="8" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <p class="section-heading">Behaviour</p>

        <label>Apply settings when</label>
        <div class="radio-row">
            <label class="radio-label"><input type="radio" name="apply-to" value="converted">Converted</label>
            <label class="radio-label"><input type="radio" name="apply-to" value="unconverted">Unconverted</label>
        </div>

        <hr class="settings-divider">
        <p class="section-heading">Symbol</p>

        <label for="custom-symbol">Currency symbol</label>
        <input id="custom-symbol" placeholder="Leave blank for default" autocomplete="off" spellcheck="false">

        <label>Position</label>
        <div class="radio-row">
            <label class="radio-label"><input type="radio" name="sym-pos" value="">Default</label>
            <label class="radio-label"><input type="radio" name="sym-pos" value="before">Left</label>
            <label class="radio-label"><input type="radio" name="sym-pos" value="after">Right</label>
        </div>

        <label class="checkbox-label">
            <input type="checkbox" id="sym-space">
            Space between symbol and number
        </label>

        <hr class="settings-divider">
        <p class="section-heading">Number format</p>

        <label for="thou-sep">Thousands separator</label>
        <select id="thou-sep">
            <option value="">Default</option>
            <option value=".">Period (.)</option>
            <option value=",">Comma (,)</option>
            <option value=" ">Space ( )</option>
            <option value="none">None</option>
        </select>

        <label>Decimal separator</label>
        <div class="radio-row">
            <label class="radio-label"><input type="radio" name="dec-sep" value="">Default</label>
            <label class="radio-label"><input type="radio" name="dec-sep" value=".">Period</label>
            <label class="radio-label"><input type="radio" name="dec-sep" value=",">Comma</label>
        </div>

        <label class="checkbox-label">
            <input type="checkbox" id="hide-zero-decimals">
            Hide decimals when zero (.00)
        </label>



        <button id="save-more">Save &amp; Refresh page</button>
    </div>

    <script src="../shared/currencies.js"></script>
    <script src="popup.js"></script>
</body>
</html>
